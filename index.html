<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClipCraft — AI Video Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Header with logo placeholder -->
    <header class="header">
      <div class="logo">
        <!-- PLACEHOLDER LOGO SVG – replace with your own later -->
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="4" width="34" height="28" rx="4" stroke="#4F46E5" stroke-width="2" fill="white"/>
          <polygon points="14,12 14,24 26,18" fill="#4F46E5"/>
          <rect x="6" y="14" width="4" height="8" rx="1" fill="#F97316"/>
        </svg>
        <span class="logo-text">ClipCraft</span>
      </div>
      <p class="tagline">Turn ideas into cinematic video clips — no camera needed.</p>
    </header>

    <!-- Mode Tabs -->
    <div class="tabs">
      <button id="tab-image" class="tab active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="2" width="20" height="20" rx="3" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="8" cy="8" r="1.5" fill="currentColor"/>
          <path d="M2 17l5-5 4 4 3-3 8 8" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        Image
      </button>
      <button id="tab-video" class="tab">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="4" width="20" height="16" rx="3" stroke="currentColor" stroke-width="1.5"/>
          <polygon points="10,8 16,12 10,16" fill="currentColor"/>
        </svg>
        Text→Video
      </button>
      <button id="tab-img2vid" class="tab">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="2" width="20" height="20" rx="3" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="8" cy="8" r="1.5" fill="currentColor"/>
          <path d="M2 17l5-5 4 4 3-3 8 8" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <polygon points="14,10 18,12 14,14" fill="currentColor"/>
        </svg>
        Image→Video
      </button>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <textarea id="prompt" placeholder="Describe your scene (e.g., 'anime girl walking through cherry blossoms at sunset')"></textarea>
      <div class="file-upload-wrapper" id="file-wrapper" style="display:none;">
        <label for="image-upload" class="file-label">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 16V4M12 4L8 8M12 4l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M20 16v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Choose Image
        </label>
        <input type="file" id="image-upload" accept="image/*">
        <span id="file-name" class="file-name"></span>
      </div>
      <button id="generate-btn" class="generate-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Generate Now
      </button>
    </div>

    <!-- Result & Loading -->
    <div class="result-area">
      <div id="loading" class="loading" style="display:none;">
        <svg class="spinner" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" stroke-dasharray="15 85" stroke-linecap="round" />
        </svg>
        Crafting your clip...
      </div>

      <div id="output-card" class="output-card" style="display:none;">
        <div class="card-header">
          <span id="card-title">Your Generated Clip</span>
          <button id="download-btn" class="download-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M12 16V4M12 16L8 12M12 16l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M4 20h16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span id="download-text">Download</span>
          </button>
        </div>
        <img id="output-image" class="output-media" style="display:none;" alt="Generated scene">
        <video id="output-video" controls class="output-media" style="display:none;"></video>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
