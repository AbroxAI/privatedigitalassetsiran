<!doctype html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASTRONBOT.MAX Replica</title>
  <style>
    :root {
      --bg: #04070d;
      --panel: #0d1732;
      --panel-dark: #0a1021;
      --text: #eef3ff;
      --green: #22ff10;
      --green2: #15c800;
      --red: #ef0a0a;
      --line: rgba(255,255,255,0.09);
    }* { box-sizing: border-box; }
html, body { width: 100%; height: 100%; margin: 0; }
body {
  display: grid;
  place-items: center;
  background:
    linear-gradient(180deg, #090b10 0%, #061020 40%, #04070d 100%);
  font-family: Arial, Helvetica, sans-serif;
  overflow: hidden;
}

.stage {
  position: relative;
  width: min(100vw, 925px);
  height: min(100vh, 1540px);
  aspect-ratio: 925 / 1540;
  overflow: hidden;
  background:
    radial-gradient(circle at 11% 8%, rgba(255,255,255,0.22), transparent 14%),
    radial-gradient(circle at 84% 23%, rgba(255,255,255,0.10), transparent 10%),
    radial-gradient(circle at 52% 74%, rgba(0,255,60,0.18), transparent 8%),
    radial-gradient(circle at 34% 86%, rgba(255,255,255,0.12), transparent 16%),
    linear-gradient(180deg, #081223 0%, #0d2b5d 32%, #07101f 100%);
  box-shadow: 0 36px 100px rgba(0,0,0,0.52);
}

/* blurred market chart vibe */
.stage::before,
.stage::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.stage::before {
  background:
    radial-gradient(circle at 19% 74%, rgba(255,255,255,0.18), transparent 2.8%),
    radial-gradient(circle at 17% 84%, rgba(255,255,255,0.10), transparent 2.5%),
    radial-gradient(circle at 52% 83%, rgba(0,255,0,0.18), transparent 3%),
    radial-gradient(circle at 50% 68%, rgba(0,255,0,0.10), transparent 2.6%),
    radial-gradient(circle at 89% 17%, rgba(255,255,255,0.18), transparent 3%),
    radial-gradient(circle at 89% 43%, rgba(255,255,255,0.11), transparent 3%),
    radial-gradient(circle at 34% 27%, rgba(255,255,255,0.10), transparent 2.4%);
  filter: blur(10px);
  opacity: 0.7;
  mix-blend-mode: screen;
}
.stage::after {
  background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.1));
}

.logo {
  position: absolute;
  top: 20px;
  left: 38px;
  right: 38px;
  z-index: 5;
  display: flex;
  align-items: flex-end;
  gap: 14px;
  color: var(--green);
  text-shadow: 0 0 14px rgba(25,255,25,0.35), 0 0 30px rgba(25,255,25,0.13);
}

.emblem {
  width: 56px;
  height: 56px;
  position: relative;
  flex: 0 0 auto;
  transform: translateY(4px);
  filter: drop-shadow(0 0 10px rgba(20,255,20,0.35));
}
.emblem::before {
  content: "";
  position: absolute;
  inset: 4px 3px 4px 3px;
  border: 6px solid var(--green);
  clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
  opacity: 0.95;
}
.emblem::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 50%;
  width: 18px;
  height: 18px;
  transform: translate(-50%, -14%) rotate(90deg);
  border-left: 6px solid var(--green);
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
  clip-path: polygon(45% 0%, 100% 100%, 0% 100%);
  opacity: 0.0;
}

.wordmark {
  line-height: 0.88;
  margin-bottom: 2px;
}
.wordmark .name {
  margin: 0;
  font-size: clamp(44px, 6.2vw, 92px);
  font-weight: 900;
  letter-spacing: -2px;
}
.wordmark .tag {
  margin-top: 8px;
  font-size: clamp(12px, 1.9vw, 24px);
  font-weight: 700;
  letter-spacing: 0.58em;
  text-indent: 0.58em;
  color: var(--green);
}

.card {
  position: absolute;
  left: 34px;
  right: 34px;
  top: 184px;
  bottom: 80px;
  border-radius: 12px;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(8,31,65,0.18), rgba(6,12,25,0.2)),
    radial-gradient(circle at 50% 0%, rgba(255,255,255,0.08), transparent 15%),
    linear-gradient(180deg, #0a2148 0%, #143b7d 34%, #081124 100%);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
}

.controls {
  position: absolute;
  left: 29px;
  right: 29px;
  top: 19px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  z-index: 4;
}
.ctrl {
  min-height: 82px;
  border-radius: 11px;
  background: rgba(16, 25, 51, 0.95);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
  color: #f5f7ff;
  display: inline-flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  padding: 18px 24px;
  font-size: clamp(22px, 2.55vw, 40px);
  font-weight: 500;
  white-space: nowrap;
}
.ctrl.pair { width: min(55%, 414px); }
.ctrl.time { width: min(23%, 165px); justify-content: center; padding-inline: 18px; }
.chev { opacity: 0.85; transform: translateY(-1px); }

.center {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  pointer-events: none;
}
.tri-stack {
  width: min(57%, 382px);
  margin-top: 56px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.tri {
  width: 100%;
  aspect-ratio: 1.6 / 1;
  display: grid;
  place-items: center;
  font-size: clamp(38px, 4.5vw, 70px);
  font-weight: 800;
  color: white;
  text-shadow: 0 1px 4px rgba(0,0,0,0.55);
}
.tri.up {
  background: linear-gradient(180deg, #4dff1b 0%, #19c200 100%);
  clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
  position: relative;
}
.tri.down {
  background: linear-gradient(180deg, #ff2516 0%, #e00000 100%);
  clip-path: polygon(50% 100%, 100% 0%, 0% 0%);
  position: relative;
}
.tri.up::after,
.tri.down::after {
  content: "";
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 104%;
  height: 9px;
  background: linear-gradient(180deg, rgba(142, 183, 255, 0.75), rgba(142, 183, 255, 0.18));
  filter: blur(0.3px);
}
.tri.up::after { bottom: -5px; }
.tri.down::after { top: -5px; }

.actions {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 26px;
  display: flex;
  justify-content: center;
  z-index: 4;
}
.start-btn {
  min-width: 380px;
  width: min(44%, 420px);
  height: 78px;
  border: 0;
  border-radius: 22px;
  background: linear-gradient(180deg, #40ff1a 0%, #16c800 100%);
  color: #f3fff3;
  font-size: clamp(26px, 3.2vw, 44px);
  font-weight: 700;
  letter-spacing: 0.02em;
  box-shadow: 0 12px 24px rgba(16,255,0,0.2), inset 0 1px 0 rgba(255,255,255,0.18);
  display: grid;
  place-items: center;
}

@media (max-width: 700px) {
  .stage { width: 100vw; height: 100vh; aspect-ratio: auto; }
  .logo { top: 14px; left: 14px; right: 14px; gap: 10px; }
  .emblem { width: 42px; height: 42px; }
  .card { left: 14px; right: 14px; top: 120px; bottom: 14px; }
  .controls { top: 12px; left: 12px; right: 12px; }
  .ctrl { min-height: 58px; padding: 12px 14px; border-radius: 10px; font-size: 16px; }
  .ctrl.pair { width: 66%; }
  .ctrl.time { width: 30%; }
  .tri-stack { width: 70%; margin-top: 88px; }
  .start-btn { min-width: 260px; width: 62%; height: 62px; border-radius: 18px; font-size: 22px; }
}

  </style>
</head>
<body>
  <div class="stage" aria-label="Trading dashboard replica">
    <div class="logo">
      <div class="emblem" aria-hidden="true"></div>
      <div class="wordmark">
        <h1 class="name">ASTRONBOT.MAX</h1>
        <div class="tag">TRADING I.A</div>
      </div>
    </div><div class="card">
  <div class="controls">
    <div class="ctrl pair">EUR/USD (OTC) <span class="chev">⌄</span></div>
    <div class="ctrl time">15s <span class="chev">⌄</span></div>
  </div>

  <div class="center">
    <div class="tri-stack">
      <div class="tri up">56%</div>
      <div class="tri down">44%</div>
    </div>
  </div>

  <div class="actions">
    <button class="start-btn" type="button">START SIGNAL</button>
  </div>
</div>

  </div>
</body>
</html>
