<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KickTron AI | Value Bet Scanner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      background: radial-gradient(ellipse at top, #0a0f20, #000000);
    }
    .glow {
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
    }
    .input-glow:focus {
      border-color: #00d4ff;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
    }
  </style>
</head>
<body class="min-h-screen text-white font-sans">

  <!-- Navbar -->
  <nav class="max-w-6xl mx-auto flex items-center justify-between p-4">
    <div class="flex items-center gap-3">
      <!-- Replace with your logo file name (put in same folder) -->
      <img src="kicktron-logo.png" alt="KickTron AI" class="h-12 w-12 rounded-full border border-cyan-400/30">
      <span class="text-2xl font-bold bg-gradient-to-r from-cyan-300 to-blue-400 bg-clip-text text-transparent">KickTron AI</span>
    </div>
    <div class="flex gap-4 text-sm text-gray-300">
      <span class="flex items-center gap-1"><i data-lucide="trending-up" class="w-4 h-4"></i> Championship</span>
      <span class="flex items-center gap-1"><i data-lucide="bar-chart-3" class="w-4 h-4"></i> League Two</span>
    </div>
  </nav>

  <!-- Main -->
  <main class="max-w-4xl mx-auto mt-8 px-4">
    <h1 class="text-4xl font-bold text-center mb-2">Over 2.5 Goals Scanner</h1>
    <p class="text-gray-400 text-center mb-8">Paste today's matches • Get instant value bets</p>

    <!-- League selection -->
    <div class="flex justify-center gap-4 mb-8">
      <button onclick="addMatch('Championship')" class="px-6 py-2 bg-cyan-500/10 border border-cyan-400/20 rounded-xl hover:bg-cyan-500/20 transition">
        <i data-lucide="plus" class="w-4 h-4 inline mr-2"></i>Add Championship Match
      </button>
      <button onclick="addMatch('League Two')" class="px-6 py-2 bg-emerald-500/10 border border-emerald-400/20 rounded-xl hover:bg-emerald-500/20 transition">
        <i data-lucide="plus" class="w-4 h-4 inline mr-2"></i>Add League Two Match
      </button>
    </div>

    <!-- Matches container -->
    <div id="matches-container" class="space-y-3 mb-10">
      <!-- Dynamic match rows appear here -->
    </div>

    <!-- Scan button -->
    <div class="flex justify-center mb-10">
      <button onclick="scanBets()" class="px-10 py-4 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-2xl font-bold text-lg shadow-lg hover:shadow-cyan-500/25 transition">
        <i data-lucide="search" class="w-5 h-5 inline mr-2"></i>Scan for Value Bets
      </button>
    </div>

    <!-- Results -->
    <div id="results" class="hidden max-w-2xl mx-auto">
      <div class="flex items-center gap-2 mb-4">
        <i data-lucide="zap" class="w-5 h-5 text-yellow-400"></i>
        <h2 class="text-2xl font-semibold">Value Bets</h2>
      </div>
      <div id="bets-list" class="space-y-3"></div>
    </div>
  </main>

  <script>
    // ---------- GLOBAL ----------
    const API_BASE = "YOUR_NGROK_URL_HERE";  // ← Replace with Colab ngrok URL
    let matches = [];

    // ---------- ADD MATCH ROW ----------
    function addMatch(league) {
      const container = document.getElementById('matches-container');
      const id = Date.now();
      matches.push({ id, league, home: '', away: '', odds: '' });

      const div = document.createElement('div');
      div.id = `match-${id}`;
      div.className = 'flex flex-wrap items-center gap-3 bg-white/5 p-3 rounded-xl border border-white/10';

      // League badge
      const badge = `<span class="text-xs px-3 py-1 rounded-full ${league === 'Championship' ? 'bg-cyan-500/20 text-cyan-300' : 'bg-emerald-500/20 text-emerald-300'}">${league}</span>`;

      // Home team dropdown (populated from API)
      const homeSelect = document.createElement('select');
      homeSelect.className = 'bg-black/50 border border-gray-700 rounded-lg px-3 py-2 text-white input-glow';
      homeSelect.required = true;
      homeSelect.innerHTML = '<option value="">Home team...</option>';

      // Away team dropdown
      const awaySelect = document.createElement('select');
      awaySelect.className = 'bg-black/50 border border-gray-700 rounded-lg px-3 py-2 text-white input-glow';
      awaySelect.required = true;
      awaySelect.innerHTML = '<option value="">Away team...</option>';

      // Populate team lists (cache API call)
      fetch(`${API_BASE}/teams/${league}`)
        .then(r => r.json())
        .then(teams => {
          teams.forEach(t => {
            homeSelect.innerHTML += `<option value="${t}">${t}</option>`;
            awaySelect.innerHTML += `<option value="${t}">${t}</option>`;
          });
        });

      // Odds input
      const oddsInput = document.createElement('input');
      oddsInput.type = 'number';
      oddsInput.step = '0.01';
      oddsInput.placeholder = 'Over 2.5 odds';
      oddsInput.className = 'bg-black/50 border border-gray-700 rounded-lg px-3 py-2 w-32 text-white input-glow';

      // Delete button
      const delBtn = document.createElement('button');
      delBtn.className = 'p-2 hover:bg-red-500/20 rounded-lg';
      delBtn.innerHTML = '<i data-lucide="trash-2" class="w-4 h-4 text-red-400"></i>';
      delBtn.onclick = () => {
        matches = matches.filter(m => m.id != id);
        document.getElementById(`match-${id}`).remove();
      };

      div.innerHTML = badge;
      div.appendChild(homeSelect);
      div.appendChild(awaySelect);
      div.appendChild(oddsInput);
      div.appendChild(delBtn);
      container.appendChild(div);
      lucide.createIcons();

      // Update stored data on change
      homeSelect.onchange = () => matches.find(m => m.id == id).home = homeSelect.value;
      awaySelect.onchange = () => matches.find(m => m.id == id).away = awaySelect.value;
      oddsInput.oninput   = () => matches.find(m => m.id == id).odds = oddsInput.value;
    }

    // ---------- SCAN BETS ----------
    async function scanBets() {
      // Validate
      const valid = matches.filter(m => m.home && m.away && m.odds);
      if (!valid.length) return alert('Please fill all match fields.');

      // Group by league
      const champ = valid.filter(m => m.league === 'Championship').map(m => ({home_team:m.home, away_team:m.away, odds_over: parseFloat(m.odds)}));
      const l2    = valid.filter(m => m.league === 'League Two').map(m => ({home_team:m.home, away_team:m.away, odds_over: parseFloat(m.odds)}));

      // Call backend
      const res = await fetch(`${API_BASE}/predict`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ championship: champ, league_two: l2 })
      });
      const data = await res.json();

      // Display results
      const resultsDiv = document.getElementById('results');
      const betsList   = document.getElementById('bets-list');
      betsList.innerHTML = '';
      if (data.bets.length === 0) {
        resultsDiv.classList.remove('hidden');
        betsList.innerHTML = '<div class="text-gray-400 text-center py-6">No value bets found today. Stay disciplined.</div>';
        return;
      }
      data.bets.forEach(bet => {
        const item = document.createElement('div');
        item.className = 'bg-white/5 p-4 rounded-xl border border-white/10';
        item.innerHTML = `
          <div class="flex justify-between items-start">
            <div>
              <span class="text-xs px-2 py-1 rounded ${bet.league==='Championship'?'bg-cyan-500/20 text-cyan-300':'bg-emerald-500/20 text-emerald-300'}">${bet.league}</span>
              <h3 class="text-lg font-semibold mt-1">${bet.home} vs ${bet.away}</h3>
              <p class="text-sm text-gray-400">Over 2.5 • Odds: <span class="text-white font-semibold">${bet.odds}</span></p>
            </div>
            <div class="text-right">
              <p class="text-lg font-bold text-green-400">${bet.edge}</p>
              <p class="text-sm text-gray-300">Stake: 1%</p>
            </div>
          </div>`;
        betsList.appendChild(item);
      });
      resultsDiv.classList.remove('hidden');
    }

    lucide.createIcons();
  </script>
</body>
</html>
