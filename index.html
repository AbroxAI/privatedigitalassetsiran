<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KickTron AI | Value Bet Scanner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      background: radial-gradient(ellipse at 50% 0%, #1a0a0a, #000000 70%);
      min-height: 100vh;
    }
    .hero-glow {
      text-shadow: 0 0 40px rgba(255, 60, 60, 0.6), 0 0 80px rgba(255, 60, 60, 0.3);
    }
    .btn-glow {
      box-shadow: 0 0 30px rgba(234, 179, 8, 0.4), 0 0 60px rgba(234, 179, 8, 0.15);
      transition: all 0.3s ease;
    }
    .btn-glow:hover {
      box-shadow: 0 0 45px rgba(234, 179, 8, 0.6), 0 0 80px rgba(234, 179, 8, 0.25);
      transform: translateY(-1px);
    }
    .input-glow:focus {
      border-color: #eab308;
      box-shadow: 0 0 15px rgba(234, 179, 8, 0.25);
      outline: none;
    }
    .card-border {
      border: 1px solid rgba(234, 179, 8, 0.15);
    }
    .card-border:hover {
      border-color: rgba(234, 179, 8, 0.3);
    }
    /* Loading spinner */
    .loader {
      border: 3px solid rgba(234, 179, 8, 0.2);
      border-top: 3px solid #eab308;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="text-white font-sans antialiased">

  <!-- Navbar -->
  <nav class="max-w-5xl mx-auto flex items-center justify-between px-4 py-5">
    <!-- Logo only, no text -->
    <a href="/" class="flex items-center">
      <img 
        src="assets/kicktron-logo.png" 
        alt="KickTron AI" 
        class="h-16 w-16 object-contain drop-shadow-[0_0_18px_rgba(234,179,8,0.35)]"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
      >
      <span class="hidden text-2xl font-bold text-yellow-400">KickTron AI</span>
    </a>

    <!-- League badges -->
    <div class="flex gap-3 text-sm font-medium">
      <span class="flex items-center gap-1.5 px-3 py-1.5 bg-yellow-500/10 border border-yellow-500/25 rounded-full text-yellow-300">
        <i data-lucide="trophy" class="w-4 h-4"></i> Championship
      </span>
      <span class="flex items-center gap-1.5 px-3 py-1.5 bg-yellow-500/10 border border-yellow-500/25 rounded-full text-yellow-300">
        <i data-lucide="shield" class="w-4 h-4"></i> League Two
      </span>
    </div>
  </nav>

  <!-- Hero -->
  <main class="max-w-3xl mx-auto mt-2 px-4 pb-16">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-extrabold hero-glow text-red-400 mb-3 tracking-tight">
        Over 2.5 Goals Scanner
      </h1>
      <p class="text-yellow-200/60 text-lg">
        <i data-lucide="zap" class="w-4 h-4 inline text-yellow-400 mr-1"></i>
        Add today's matches — get instant edge
      </p>
      <!-- Backend status indicator -->
      <div id="backend-status" class="mt-3 text-xs text-yellow-200/40">
        <span id="status-dot" class="inline-block w-2 h-2 rounded-full bg-red-500 mr-1"></span>
        <span id="status-text">Checking backend...</span>
      </div>
    </div>

    <!-- Add Match Buttons -->
    <div class="flex flex-wrap justify-center gap-3 mb-8">
      <button onclick="addMatch('Championship')" 
              class="flex items-center gap-2 px-5 py-2.5 bg-yellow-500/10 border border-yellow-500/25 rounded-xl text-yellow-300 font-medium hover:bg-yellow-500/20 transition">
        <i data-lucide="plus-circle" class="w-5 h-5"></i> Add Championship
      </button>
      <button onclick="addMatch('League Two')" 
              class="flex items-center gap-2 px-5 py-2.5 bg-yellow-500/10 border border-yellow-500/25 rounded-xl text-yellow-300 font-medium hover:bg-yellow-500/20 transition">
        <i data-lucide="plus-circle" class="w-5 h-5"></i> Add League Two
      </button>
    </div>

    <!-- Match Cards -->
    <div id="matches-container" class="space-y-3 mb-10">
      <!-- Dynamically added -->
    </div>

    <!-- Scan Button -->
    <div class="flex justify-center mb-12">
      <button onclick="scanBets()" id="scan-btn"
              class="btn-glow flex items-center gap-3 px-12 py-4 bg-yellow-500 rounded-2xl text-red-700 font-extrabold text-lg tracking-wide hover:bg-yellow-400 transition disabled:opacity-50 disabled:cursor-not-allowed">
        <i data-lucide="search" class="w-6 h-6"></i> Scan for Value Bets
      </button>
    </div>

    <!-- Results -->
    <div id="results" class="hidden max-w-2xl mx-auto">
      <div class="flex items-center gap-2 mb-5">
        <i data-lucide="flame" class="w-6 h-6 text-red-500"></i>
        <h2 class="text-2xl font-bold text-yellow-300">Value Bets Found</h2>
      </div>
      <div id="bets-list" class="space-y-3"></div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="text-center text-yellow-200/25 text-xs pb-8">
    KickTron AI &copy; 2026 · Honest edge. Disciplined bets.
  </footer>

  <script>
    // ---------- CONFIGURATION ----------
    const API_BASE = "https://cortex-jaundice-disprove.ngrok-free.dev";
    
    // ---------- GLOBAL STATE ----------
    let matches = [];
    let teamCache = {};  // cache team lists per league

    // ---------- BACKEND HEALTH CHECK ----------
    async function checkBackend() {
      const statusDot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');
      try {
        const resp = await fetch(`${API_BASE}/teams/Championship`);
        if (resp.ok) {
          statusDot.className = 'inline-block w-2 h-2 rounded-full bg-green-500 mr-1';
          statusText.textContent = 'Backend connected';
        } else {
          throw new Error('Not OK');
        }
      } catch (e) {
        statusDot.className = 'inline-block w-2 h-2 rounded-full bg-red-500 mr-1';
        statusText.textContent = 'Backend offline — start Colab Cell 4';
      }
    }
    checkBackend();
    // Re-check every 30 seconds
    setInterval(checkBackend, 30000);

    // ---------- HELPER: FETCH TEAMS WITH CACHE ----------
    async function fetchTeams(league) {
      if (teamCache[league]) return teamCache[league];
      try {
        const resp = await fetch(`${API_BASE}/teams/${league}`);
        if (!resp.ok) throw new Error('Failed');
        const teams = await resp.json();
        teamCache[league] = teams;
        return teams;
      } catch (e) {
        console.warn(`Could not fetch teams for ${league}, using manual input`);
        return [];
      }
    }

    // ---------- ADD MATCH ROW ----------
    async function addMatch(league) {
      const container = document.getElementById('matches-container');
      const id = Date.now();
      matches.push({ id, league, home: '', away: '', odds: '' });

      const card = document.createElement('div');
      card.id = `match-${id}`;
      card.className = 'card-border flex flex-wrap items-center gap-3 bg-white/[0.03] p-4 rounded-2xl backdrop-blur-sm';

      // League badge
      const badge = document.createElement('span');
      badge.className = `text-xs font-semibold px-3 py-1 rounded-full bg-yellow-500/15 text-yellow-300 border border-yellow-500/25`;
      badge.textContent = league;

      // Home team input (tries dropdown, falls back to text)
      const homeInput = document.createElement('input');
      homeInput.type = 'text';
      homeInput.list = `home-list-${id}`;
      homeInput.placeholder = 'Home team...';
      homeInput.className = 'bg-black/40 border border-yellow-500/20 rounded-lg px-3 py-2.5 text-white input-glow min-w-[140px] placeholder:text-gray-500';
      // Datalist for autocomplete
      const homeDatalist = document.createElement('datalist');
      homeDatalist.id = `home-list-${id}`;
      homeInput.appendChild(homeDatalist);
      // Fetch teams and populate datalist
      fetchTeams(league).then(teams => {
        teams.forEach(t => {
          const opt = document.createElement('option');
          opt.value = t;
          homeDatalist.appendChild(opt);
        });
      });

      // vs label
      const vsLabel = document.createElement('span');
      vsLabel.className = 'text-yellow-200/50 font-semibold text-sm';
      vsLabel.textContent = 'vs';

      // Away team input
      const awayInput = document.createElement('input');
      awayInput.type = 'text';
      awayInput.list = `away-list-${id}`;
      awayInput.placeholder = 'Away team...';
      awayInput.className = 'bg-black/40 border border-yellow-500/20 rounded-lg px-3 py-2.5 text-white input-glow min-w-[140px] placeholder:text-gray-500';
      const awayDatalist = document.createElement('datalist');
      awayDatalist.id = `away-list-${id}`;
      awayInput.appendChild(awayDatalist);
      fetchTeams(league).then(teams => {
        teams.forEach(t => {
          const opt = document.createElement('option');
          opt.value = t;
          awayDatalist.appendChild(opt);
        });
      });

      // Odds input
      const oddsInput = document.createElement('input');
      oddsInput.type = 'number';
      oddsInput.step = '0.01';
      oddsInput.min = '1.01';
      oddsInput.placeholder = 'O2.5 odds';
      oddsInput.className = 'bg-black/40 border border-yellow-500/20 rounded-lg px-3 py-2.5 w-28 text-white input-glow placeholder:text-gray-500';

      // Delete button
      const delBtn = document.createElement('button');
      delBtn.className = 'p-2.5 hover:bg-red-500/15 rounded-lg transition';
      delBtn.innerHTML = '<i data-lucide="trash-2" class="w-4 h-4 text-red-400"></i>';
      delBtn.onclick = () => {
        matches = matches.filter(m => m.id != id);
        card.remove();
      };

      // Assemble card
      card.appendChild(badge);
      card.appendChild(homeInput);
      card.appendChild(vsLabel);
      card.appendChild(awayInput);
      card.appendChild(oddsInput);
      card.appendChild(delBtn);
      container.appendChild(card);

      // Sync state
      homeInput.oninput = () => { const m = matches.find(m => m.id == id); if (m) m.home = homeInput.value.trim(); };
      awayInput.oninput = () => { const m = matches.find(m => m.id == id); if (m) m.away = awayInput.value.trim(); };
      oddsInput.oninput = () => { const m = matches.find(m => m.id == id); if (m) m.odds = oddsInput.value; };

      lucide.createIcons();
    }

    // ---------- SCAN BETS ----------
    async function scanBets() {
      const valid = matches.filter(m => m.home && m.away && m.odds);
      if (!valid.length) {
        alert('Please fill in ALL match fields (home team, away team, AND odds) before scanning.');
        return;
      }

      // Show loading state
      const scanBtn = document.getElementById('scan-btn');
      scanBtn.disabled = true;
      scanBtn.innerHTML = '<span class="loader"></span> Scanning...';

      const champ = valid
        .filter(m => m.league === 'Championship')
        .map(m => ({ home_team: m.home, away_team: m.away, odds_over: parseFloat(m.odds) }));
      const l2 = valid
        .filter(m => m.league === 'League Two')
        .map(m => ({ home_team: m.home, away_team: m.away, odds_over: parseFloat(m.odds) }));

      try {
        const res = await fetch(`${API_BASE}/predict`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ championship: champ, league_two: l2 })
        });
        const data = await res.json();

        const resultsDiv = document.getElementById('results');
        const betsList = document.getElementById('bets-list');
        betsList.innerHTML = '';

        if (!data.bets || data.bets.length === 0) {
          resultsDiv.classList.remove('hidden');
          betsList.innerHTML = `
            <div class="text-center py-8 bg-white/[0.02] rounded-2xl border border-yellow-500/10">
              <i data-lucide="thumbs-up" class="w-10 h-10 text-yellow-500/40 mx-auto mb-3"></i>
              <p class="text-yellow-200/50 text-lg">No value bets today</p>
              <p class="text-yellow-200/30 text-sm mt-1">Stay disciplined. The edge comes to those who wait.</p>
            </div>`;
          lucide.createIcons();
          return;
        }

        data.bets.forEach(bet => {
          const item = document.createElement('div');
          item.className = 'bg-white/[0.03] p-5 rounded-2xl card-border backdrop-blur-sm';
          item.innerHTML = `
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3">
              <div>
                <span class="text-xs font-semibold px-2.5 py-1 rounded-full bg-yellow-500/15 text-yellow-300 border border-yellow-500/25">
                  ${bet.league}
                </span>
                <h3 class="text-xl font-bold mt-2 text-white">${bet.home} vs ${bet.away}</h3>
                <p class="text-sm text-yellow-200/50 mt-1">
                  Over 2.5 Goals · Odds: <span class="text-yellow-300 font-semibold">${bet.odds}</span>
                </p>
              </div>
              <div class="text-right">
                <p class="text-2xl font-extrabold text-red-400">${bet.edge}</p>
                <p class="text-sm text-yellow-200/60 mt-1">Stake: <span class="font-bold text-yellow-300">1%</span> of bankroll</p>
              </div>
            </div>`;
          betsList.appendChild(item);
        });

        resultsDiv.classList.remove('hidden');
        lucide.createIcons();
        resultsDiv.scrollIntoView({ behavior: 'smooth' });
      } catch (err) {
        alert('Backend connection failed. Is Colab Cell 4 running? Check the status indicator above.');
        console.error(err);
      } finally {
        // Reset button
        scanBtn.disabled = false;
        scanBtn.innerHTML = '<i data-lucide="search" class="w-6 h-6"></i> Scan for Value Bets';
        lucide.createIcons();
      }
    }

    lucide.createIcons();
  </script>
</body>
</html>
