<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASTRONBOT.MAX Replica</title>
  <style>
    :root {
      --green: #22ff10;
      --green-dark: #13c800;
      --red: #ef0505;
      --ink: #07111f;
      --panel: #0b1630;
      --panel-2: #10192f;
      --line: rgba(255,255,255,0.10);
      --text: #edf2ff;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 14%, rgba(255,255,255,0.28), transparent 14%),
        radial-gradient(circle at 84% 20%, rgba(255,255,255,0.12), transparent 12%),
        linear-gradient(180deg, #f5f3ef 0%, #d3d1cf 14%, #92a0ab 30%, #0b1222 100%);
      font-family: Arial, Helvetica, sans-serif;
    }

    .scene {
      position: relative;
      width: min(100vw, 849px);
      height: min(100vh, 1536px);
      aspect-ratio: 849 / 1536;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.04)),
        radial-gradient(circle at 23% 18%, rgba(255,255,255,0.85), transparent 15%),
        radial-gradient(circle at 69% 18%, rgba(255,255,255,0.70), transparent 12%),
        radial-gradient(circle at 56% 70%, rgba(23,255,26,0.16), transparent 8%),
        linear-gradient(180deg, #e8e7e4 0%, #b8bcc1 16%, #76828d 30%, #111a2a 100%);
    }

    /* photo background hints */
    .sky {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 18%, rgba(255,255,255,0.72), transparent 16%),
        radial-gradient(circle at 36% 22%, rgba(255,255,255,0.38), transparent 14%),
        radial-gradient(circle at 74% 20%, rgba(255,255,255,0.45), transparent 12%),
        radial-gradient(circle at 88% 24%, rgba(255,255,255,0.28), transparent 14%),
        linear-gradient(180deg, rgba(255,255,255,0.88) 0%, rgba(230,230,226,0.55) 20%, rgba(19,25,38,0.12) 30%, rgba(7,14,25,0.0) 40%),
        linear-gradient(180deg, #f6f4f2 0%, #ebe9e7 18%, #d3d0cf 28%, #a0a4a8 44%, #121a2d 100%);
      filter: blur(0.4px);
    }
    .window-bars {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .window-bars::before,
    .window-bars::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 12px;
      background: linear-gradient(180deg, rgba(190,190,190,0.8), rgba(115,115,115,0.9));
      left: 48%;
      transform: translateX(-50%);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.18);
    }
    .window-bars::after {
      left: 52.1%;
      width: 3px;
      background: linear-gradient(180deg, rgba(245,245,245,0.8), rgba(120,120,120,0.9));
      box-shadow: none;
    }

    .monitor {
      position: absolute;
      left: -2%;
      bottom: 0;
      width: 78%;
      height: 66%;
      border-radius: 32px 32px 0 0;
      background: #0b1018;
      transform: rotate(-0.6deg);
      box-shadow: 0 -3px 0 rgba(255,255,255,0.02), 0 20px 60px rgba(0,0,0,0.48);
    }
    .monitor::before {
      content: "";
      position: absolute;
      inset: 18px 18px 18px 18px;
      border-radius: 20px 20px 0 0;
      background: linear-gradient(180deg, #11161f 0%, #10161d 100%);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
    }

    .screen {
      position: absolute;
      left: 3.4%;
      top: 6.3%;
      width: 93.2%;
      height: 88.8%;
      overflow: hidden;
      background: linear-gradient(180deg, #e6e1ed 0%, #f3eef8 11%, #e9e2f0 12%, #10161f 12%, #0a1323 100%);
      border-radius: 14px 14px 6px 6px;
    }

    .browser-bar {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 58px;
      background: linear-gradient(180deg, #eceaf0 0%, #ddd7e2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #60656b;
      font-size: 16px;
      z-index: 5;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .browser-bar::before {
      content: "Pesquisar com Bing";
      position: relative;
      padding-left: 28px;
      opacity: 0.9;
    }

    .app {
      position: absolute;
      inset: 58px 0 0 0;
      display: grid;
      grid-template-columns: 22% 78%;
      background: linear-gradient(180deg, #0b1424 0%, #0a1220 100%);
    }

    .sidebar {
      position: relative;
      background:
        linear-gradient(180deg, #141b2b 0%, #101723 100%);
      border-right: 1px solid rgba(255,255,255,0.07);
      color: var(--text);
      padding: 16px 10px;
      overflow: hidden;
    }
    .sidebar .mini {
      display: block;
      margin: 0 0 12px 0;
      width: 100%;
      height: 28px;
      border-radius: 3px;
      border: 1px solid rgba(115,255,115,0.32);
      color: #97ff8a;
      background: rgba(8,12,20,0.95);
      font-size: 12px;
      padding: 0 8px;
      line-height: 28px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar .card {
      margin-top: 10px;
      background: rgba(19,24,34,0.98);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 10px 10px 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .sidebar .label {
      font-size: 13px;
      color: #c0c5d2;
      margin-bottom: 6px;
    }
    .sidebar .profit {
      color: #8dff70;
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
      margin: 4px 0 2px;
    }
    .sidebar .profit2 {
      color: #8dff70;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .side-btn {
      display: grid;
      place-items: center;
      height: 86px;
      border-radius: 2px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
      border: 1px solid rgba(255,255,255,0.06);
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .side-btn.green {
      color: #e9ffe5;
      background: linear-gradient(180deg, #42ff18 0%, #19cf00 100%);
    }
    .side-btn.red {
      color: #fff;
      background: linear-gradient(180deg, #ff3b2b 0%, #e90000 100%);
    }

    .main {
      position: relative;
      background:
        radial-gradient(circle at 52% 28%, rgba(21,255,44,0.26), transparent 4%),
        radial-gradient(circle at 61% 41%, rgba(43,204,255,0.12), transparent 8%),
        linear-gradient(180deg, #0d234b 0%, #183d7f 23%, #08111f 100%);
      overflow: hidden;
    }

    .top-brand {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 86px;
      background: #050505;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 6;
    }
    .brand-wrap {
      position: relative;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      color: var(--green);
      text-shadow: 0 0 12px rgba(34,255,16,0.38), 0 0 26px rgba(34,255,16,0.16);
      transform: translateX(-12px);
    }
    .mark {
      width: 42px;
      height: 42px;
      position: relative;
      flex: 0 0 auto;
      transform: translateY(2px);
    }
    .mark::before {
      content: "";
      position: absolute;
      inset: 5px 4px 5px 4px;
      border: 4px solid var(--green);
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    }
    .brand-copy { line-height: 0.82; }
    .brand-copy .name {
      margin: 0;
      font-size: clamp(39px, 5.2vw, 74px);
      font-weight: 900;
      letter-spacing: -2px;
    }
    .brand-copy .sub {
      margin-top: 6px;
      font-size: 13px;
      letter-spacing: 0.62em;
      text-indent: 0.62em;
      font-weight: 700;
      color: var(--green);
    }

    .controls {
      position: absolute;
      left: 22px;
      right: 22px;
      top: 102px;
      display: flex;
      justify-content: space-between;
      z-index: 6;
    }
    .control {
      height: 50px;
      border-radius: 7px;
      background: rgba(18,26,44,0.96);
      border: 1px solid rgba(255,255,255,0.14);
      color: #f5f8ff;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 18px;
      font-size: 16px;
      font-weight: 500;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .control.pair { width: 64%; }
    .control.time { width: 22%; justify-content: center; }
    .chev { opacity: 0.85; }

    .tri-stack {
      position: absolute;
      left: 50%;
      top: 258px;
      width: 42%;
      transform: translateX(-8%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      z-index: 3;
    }
    .tri {
      width: 100%;
      aspect-ratio: 1.6 / 1;
      display: grid;
      place-items: center;
      font-size: 44px;
      font-weight: 800;
      color: #f7fbff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.55);
      position: relative;
    }
    .tri.up {
      background: linear-gradient(180deg, #4eff12 0%, #19c000 100%);
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    }
    .tri.down {
      background: linear-gradient(180deg, #ff2516 0%, #e10000 100%);
      clip-path: polygon(50% 100%, 100% 0%, 0% 0%);
      margin-top: 2px;
    }
    .tri.up::after,
    .tri.down::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 104%;
      height: 8px;
      background: linear-gradient(180deg, rgba(144,188,255,0.78), rgba(144,188,255,0.18));
    }
    .tri.up::after { bottom: -4px; }
    .tri.down::after { top: -4px; }

    .start-btn {
      position: absolute;
      left: 50%;
      bottom: 84px;
      transform: translateX(-50%);
      width: 44%;
      height: 46px;
      border: 0;
      border-radius: 24px;
      background: linear-gradient(180deg, #40ff18 0%, #16c900 100%);
      color: #f3fff2;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.01em;
      box-shadow: 0 10px 20px rgba(16,255,0,0.18), inset 0 1px 0 rgba(255,255,255,0.2);
      z-index: 4;
    }

    .cursor-hand {
      position: absolute;
      right: -10px;
      top: 165px;
      width: 34%;
      height: 47%;
      border-radius: 40% 0 20% 50% / 30% 0 40% 55%;
      background: radial-gradient(circle at 60% 35%, rgba(255,228,199,0.98), rgba(235,194,156,0.98) 58%, rgba(198,150,110,0.95) 100%);
      transform: rotate(8deg);
      filter: blur(0.2px);
      opacity: 0.94;
      mix-blend-mode: normal;
    }
    .cursor-hand::before {
      content: "";
      position: absolute;
      left: -38%;
      top: 48%;
      width: 56%;
      height: 12%;
      border-radius: 999px;
      background: inherit;
      transform: rotate(18deg);
      transform-origin: right center;
    }

    @media (max-width: 700px) {
      .scene { width: 100vw; height: 100vh; aspect-ratio: auto; }
      .monitor { width: 82%; height: 68%; }
      .screen { left: 3.2%; top: 6%; width: 93.5%; height: 89.1%; }
      .sidebar { padding: 12px 8px; }
      .control { height: 40px; font-size: 13px; padding: 0 12px; }
      .brand-copy .name { font-size: 28px; }
      .top-brand { height: 72px; }
      .app { inset: 46px 0 0 0; }
      .browser-bar { height: 46px; font-size: 14px; }
      .controls { top: 82px; }
      .tri-stack { top: 210px; width: 44%; }
      .start-btn { bottom: 70px; width: 52%; height: 40px; font-size: 14px; }
      .cursor-hand { display: none; }
    }
  </style>
</head>
<body>
  <div class="scene" aria-label="Trading dashboard replica">
    <div class="sky"></div>
    <div class="window-bars" aria-hidden="true"></div>

    <div class="monitor">
      <div class="screen">
        <div class="browser-bar"></div>

        <div class="app">
          <aside class="sidebar">
            <div class="mini">&nbsp;</div>
            <div class="card">
              <div class="label">Lucro</div>
              <div class="profit">+80%</div>
              <div class="profit2">+R$ 80</div>
              <div class="side-btn green">Acima</div>
              <div class="side-btn red">Abaixo</div>
            </div>
          </aside>

          <main class="main">
            <div class="top-brand">
              <div class="brand-wrap">
                <div class="mark" aria-hidden="true"></div>
                <div class="brand-copy">
                  <h1 class="name">ASTRONBOT.MAX</h1>
                  <div class="sub">TRADING I.A</div>
                </div>
              </div>
            </div>

            <div class="controls">
              <div class="control pair">EUR/USD (OTC) <span class="chev">⌄</span></div>
              <div class="control time">15s <span class="chev">⌄</span></div>
            </div>

            <div class="tri-stack">
              <div class="tri up">56%</div>
              <div class="tri down">44%</div>
            </div>

            <button class="start-btn" type="button">START SIGNAL</button>
            <div class="cursor-hand" aria-hidden="true"></div>
          </main>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
